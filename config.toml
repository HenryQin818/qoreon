  { name = "辅助01-架构与结构治理", desc = "负责结构治理、边界把关与推荐结构落位。", cli_type = "codex", default_enabled = true },
  { name = "子级01-运行时与后端", desc = "负责 runtime、API 与 bootstrap 支撑。", cli_type = "codex", default_enabled = true },
