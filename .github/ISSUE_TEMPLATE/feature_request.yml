name: Feature request
description: Propose a new feature or improvement for Qoreon.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea.

        Good requests explain the user problem first, then the suggested feature.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user workflow is blocked, confusing, or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Qoreon do instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Product area
      options:
        - Build and runtime
        - Task board UI
        - Sessions and agent activation
        - Example projects and seed packs
        - Docs and onboarding
        - Git and open-source flow
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Add screenshots, links, or comparable workflows if they help.
